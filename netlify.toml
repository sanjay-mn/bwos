[build]
  command   = "npm install"
  publish   = "public"

[functions]
  directory         = "netlify/functions"
  node_bundler      = "esbuild"

# Route all /api/* calls to the serverless function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200

# Route document generation to the same function
[[redirects]]
  from   = "/documents/*"
  to     = "/.netlify/functions/api"
  status = 200

# Route project-file downloads to the same function
[[redirects]]
  from   = "/project-files/*"
  to     = "/.netlify/functions/api"
  status = 200

# Route quote-file downloads to the same function
[[redirects]]
  from   = "/quote-files/*"
  to     = "/.netlify/functions/api"
  status = 200

# SPA fallback — serve index.html for all other routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
